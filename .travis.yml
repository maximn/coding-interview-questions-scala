language: scala
scala:
   - 3.3.6
jdk:
   - openjdk17
   - openjdk21
script:
   - sbt clean coverage test
   - sbt coverageReport
after_success:
   - sbt coveralls
cache:
   directories:
      - $HOME/.ivy2/cache
      - $HOME/.sbt
before_cache:
   - rm -fv $HOME/.ivy2/.sbt.ivy.lock
   - find $HOME/.ivy2/cache -name "ivydata-*.properties" -print -delete
   - find $HOME/.sbt        -name "*.lock"               -print -delete