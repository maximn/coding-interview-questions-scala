name: CI

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [25]
        scala: [3.3.8]

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

    - name: Setup Java and SBT
      uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.java }}

    - name: Setup SBT
      uses: sbt/setup-sbt@66fb4376e81982c7d92a4074170846fff88e2e30 # v1

    - name: Cache SBT
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
      with:
        path: |
          ~/.ivy2/cache
          ~/.sbt
          ~/.coursier/cache
        key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt', 'project/plugins.sbt', 'project/build.properties') }}
        restore-keys: |
          ${{ runner.os }}-sbt-

    - name: Run tests
      run: sbt "++${{ matrix.scala }}; clean; coverage; test; coverageReport"

    - name: TestGlance
      if: always() && matrix.java == '25'
      uses: testglance/action@23e46ab55619accffaeb969f0b6d4b55637194b9 # v1
      with:
        github-token: ${{ github.token }}
        report-path: '**/test-reports/TEST-*.xml'

    - name: Upload coverage reports to Codecov
      if: matrix.java == '25'
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
      with:
        files: ./target/out/jvm/scala-${{ matrix.scala }}/coding-interview-questions/scoverage-report/scoverage.xml
        fail_ci_if_error: false
        verbose: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    - name: Check formatting
      if: matrix.java == '25'
      run: sbt scalafmtCheckAll

