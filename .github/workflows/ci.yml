name: CI

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [17, 21, 24]
        scala: [3.3.8]

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup Java and SBT
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.java }}

    - name: Setup SBT
      uses: sbt/setup-sbt@v1

    - name: Cache SBT
      uses: actions/cache@v6
      with:
        path: |
          ~/.ivy2/cache
          ~/.sbt
          ~/.coursier/cache
        key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt', 'project/plugins.sbt', 'project/build.properties') }}
        restore-keys: |
          ${{ runner.os }}-sbt-

    - name: Run tests
      run: sbt clean coverage test coverageReport

    - name: TestGlance
      if: always() && matrix.java == '17'
      uses: testglance/action@257d6825154548f970e85566f7c19a48eb7a2ea3 # v1
      with:
        github-token: ${{ github.token }}
        report-path: '**/target/test-reports/TEST-*.xml'

    - name: Upload coverage reports to Codecov
      if: matrix.java == '17'
      uses: codecov/codecov-action@v7
      with:
        files: ./target/scala-3.3.8/scoverage-report/scoverage.xml
        fail_ci_if_error: false
        verbose: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    - name: Check formatting
      if: matrix.java == '17'
      run: sbt scalafmtCheckAll

